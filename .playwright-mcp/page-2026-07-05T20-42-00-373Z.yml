      - paragraph [ref=e72]:
        - text: The interesting part is the return path. A click in the browser POSTs to the webhook and lands in an in-memory queue. Claude consumes the queue in one of two ways (
        - link "below" [ref=e73] [cursor=pointer]:
          - /url: "#receiving"
        - text: ) — in both cases the payload arrives as ordinary tool/command output, which is why sidecar works without any push mechanism (like Claude Code channels) being available.
      - paragraph [ref=e74]:
        - text: Artifacts render inside a sandboxed iframe with an opaque origin. Artifact code can't reach the canvas shell, the session token, or the server; its only output channel is
        - code [ref=e75]: claude.send()
        - text: ", which crosses a postMessage bridge that the canvas shell validates and forwards with the token."
