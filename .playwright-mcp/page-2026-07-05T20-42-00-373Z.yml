      - heading "Security model" [level=2] [ref=e296]
      - list [ref=e297]:
        - listitem [ref=e298]:
          - text: Localhost only. The HTTP server binds
          - code [ref=e299]: 127.0.0.1
          - text: ; nothing off the machine can reach it. Don't port-forward or tunnel it — anything that reaches the webhook is eventually placed in front of Claude.
        - listitem [ref=e300]:
          - text: Per-session token. Without auth, any webpage you visit could fire cross-site POSTs at localhost and inject text into your session. Both
          - code [ref=e301]: /api/*
          - text: endpoints require a random 128-bit token generated at startup. Web pages can't read it (it lives in
          - code [ref=e302]: session.json
          - text: and the canvas shell); local processes can, and are trusted anyway.
        - listitem [ref=e303]: Sandboxed artifacts. Artifact HTML is authored by Claude, which makes it semi-trusted — a prompt-injected artifact shouldn't get free rein. The opaque-origin sandbox denies it the token, the canvas DOM, storage, and same-origin network; the canvas shell only accepts messages from the artifact iframe it created.
        - listitem [ref=e304]: "Interactions are user input. Sidecar instructs Claude to treat payloads as coming from you. Keep that in mind if you point external systems at the webhook: whatever they post is read by Claude with that framing."
