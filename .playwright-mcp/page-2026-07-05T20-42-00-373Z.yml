      - heading "Writing artifacts" [level=2] [ref=e265]
      - paragraph [ref=e266]:
        - text: Artifacts are complete HTML documents rendered in a sandboxed iframe (
        - code [ref=e267]: allow-scripts allow-forms allow-popups
        - text: ", opaque origin). Practical rules:"
      - list [ref=e268]:
        - listitem [ref=e269]: Inline everything. The opaque origin means same-origin API calls are blocked and cross-origin requests fail CORS. No CDNs, no external fonts — inline CSS and JS only.
        - listitem [ref=e270]:
          - text: No storage.
          - code [ref=e271]: localStorage
          - text: /
          - code [ref=e272]: cookies
          - text: are unavailable. Keep state in JS variables; if it must survive, send it to Claude.
        - listitem [ref=e273]:
          - generic [ref=e274]:
            - code [ref=e275]: claude.send()
            - text: is the only output.
          - text: Design every artifact around the payload you want back.
