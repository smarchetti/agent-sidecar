<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Sidecar</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E✳%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #16161d;
    --panel: #1e1e28;
    --panel-hover: #262633;
    --border: #2e2e3d;
    --text: #e8e8f0;
    --text-dim: #8a8a9e;
    --accent: #d97757;
    --ok: #5fb87a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #sidebar {
    width: 240px;
    min-width: 240px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--panel);
  }
  #sidebar header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #c4554d;
    transition: background .3s;
  }
  #status-dot.connected { background: var(--ok); }

  #artifact-list { flex: 1; overflow-y: auto; padding: 8px; }
  .artifact-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .artifact-item:hover { background: var(--panel-hover); }
  .artifact-item.active { background: var(--panel-hover); border-color: var(--accent); }
  .artifact-item .title {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-weight: 500;
  }
  .artifact-item .time { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

  #empty-note {
    color: var(--text-dim);
    padding: 24px 16px;
    text-align: center;
  }

  #main { flex: 1; display: flex; flex-direction: column; }
  #viewer { flex: 1; border: 0; width: 100%; background: #fff; }
  #placeholder {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-dim); gap: 8px;
  }
  #placeholder .logo { font-size: 40px; }

  #toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ok); color: #10241a;
    padding: 10px 18px;
    border-radius: 999px;
    font-weight: 600;
    transition: transform .25s ease;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div id="sidebar">
    <header>
      <span id="status-dot" title="connection to sidecar"></span>
      <span>Claude Sidecar</span>
    </header>
    <div id="artifact-list">
      <div id="empty-note">No artifacts yet.<br/>Ask Claude to show you something.</div>
    </div>
  </div>
  <div id="main">
    <div id="placeholder">
      <div class="logo">✳</div>
      <div>Artifacts Claude creates will appear here.</div>
    </div>
    <!-- sandboxed: artifact JS runs in an opaque origin and talks back only via postMessage -->
    <iframe id="viewer" style="display:none" title="artifact" sandbox="allow-scripts allow-forms allow-popups"></iframe>
  </div>
  <div id="toast">✓ Sent to Claude</div>

<script>
  const TOKEN = '__SIDECAR_TOKEN__' // injected by the server when this page is served
  const list = document.getElementById('artifact-list')
  const emptyNote = document.getElementById('empty-note')
  const viewer = document.getElementById('viewer')
  const placeholder = document.getElementById('placeholder')
  const statusDot = document.getElementById('status-dot')
  const toast = document.getElementById('toast')

  let artifactsById = new Map()
  let activeId = null

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  }

  function renderList() {
    list.querySelectorAll('.artifact-item').forEach(el => el.remove())
    const items = [...artifactsById.values()].sort((a, b) => b.createdAt - a.createdAt)
    emptyNote.style.display = items.length ? 'none' : 'block'
    for (const a of items) {
      const el = document.createElement('div')
      el.className = 'artifact-item' + (a.id === activeId ? ' active' : '')
      el.innerHTML = '<div class="title"></div><div class="time"></div>'
      el.querySelector('.title').textContent = a.title
      el.querySelector('.time').textContent = fmtTime(a.createdAt)
      el.onclick = () => select(a.id)
      list.appendChild(el)
    }
  }

  function newestId() {
    return [...artifactsById.values()].sort((a, b) => a.createdAt - b.createdAt).pop().id
  }

  function select(id) {
    const a = artifactsById.get(id)
    if (!a) return
    activeId = id
    location.hash = id
    placeholder.style.display = 'none'
    viewer.style.display = 'block'
    viewer.src = '/artifact/' + encodeURIComponent(id) + '?v=' + a.updatedAt
    renderList()
  }

  function showEmptyViewer() {
    activeId = null
    viewer.style.display = 'none'
    viewer.src = 'about:blank'
    placeholder.style.display = 'flex'
    renderList()
  }

  let firstSnapshot = true

  function connect() {
    const es = new EventSource('/events')
    es.onopen = () => statusDot.classList.add('connected')
    es.onerror = () => statusDot.classList.remove('connected')
    es.onmessage = ev => {
      const msg = JSON.parse(ev.data)
      if (msg.type === 'snapshot') {
        artifactsById = new Map(msg.artifacts.map(a => [a.id, a]))
        // honor a deep-link hash on initial load only; on reconnect snapshots,
        // jump to the newest artifact so focus events missed offline aren't lost
        const wanted = firstSnapshot ? location.hash.slice(1) : ''
        firstSnapshot = false
        if (wanted && artifactsById.has(wanted)) select(wanted)
        else if (artifactsById.size) select(newestId())
        else showEmptyViewer()
      } else if (msg.type === 'created') {
        artifactsById.set(msg.artifact.id, msg.artifact)
        select(msg.artifact.id) // new artifact takes focus
      } else if (msg.type === 'updated') {
        artifactsById.set(msg.artifact.id, msg.artifact)
        if (msg.artifact.id === activeId) select(msg.artifact.id) // reload iframe
        else renderList()
      } else if (msg.type === 'removed') {
        artifactsById.delete(msg.artifact.id)
        if (msg.artifact.id === activeId) {
          const rest = [...artifactsById.keys()]
          rest.length ? select(rest[rest.length - 1]) : showEmptyViewer()
        } else renderList()
      }
    }
  }
  connect()

  // Send bridge: the sandboxed artifact iframe can't reach the server directly,
  // so claude.send() posts here and we forward it with the session token.
  window.addEventListener('message', async ev => {
    const d = ev.data
    if (!d || d.type !== 'sidecar:send' || ev.source !== viewer.contentWindow) return
    let ok = false
    try {
      const res = await fetch('/api/webhook', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Sidecar-Token': TOKEN },
        body: JSON.stringify({ artifactId: d.artifactId, payload: d.payload }),
      })
      ok = res.ok
    } catch {}
    ev.source.postMessage({ type: 'sidecar:sent', id: d.id, ok }, '*')
    if (ok) {
      toast.classList.add('show')
      setTimeout(() => toast.classList.remove('show'), 1800)
    }
  })
</script>
</body>
</html>
